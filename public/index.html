<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Página Dinámica</title>
  <link rel="stylesheet" href="index.css">
</head>

<body>
  <div class="container" id="contenedor">
    <h2>Ingrese su DNI</h2>
    <input type="text" id="numero">
    <button onclick="verificarNumero()">Consultar</button>
    <div id="resultado"></div>

    <div id="lista-clientes">
      <h2>Lista de Clientes</h2>
      <button onclick="cargarClientes()">Cargar Clientes</button>
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>DNI</th>
          </tr>
        </thead>
        <tbody id="tabla-clientes">
          <!-- Los datos se llenarán dinámicamente -->
        </tbody>
      </table>
    </div>
  </div>

  <!-- <script src="script.js"></script> -->
  <script src="https://sdk.mercadopago.com/js/v2"></script>
  <script>
    function verificarNumero() {
      const numeroIngresado = document.getElementById("numero").value;
      const resultado = document.getElementById("resultado");
      const listaClientes = document.getElementById("lista-clientes");

      resultado.innerHTML = ""; // Limpiar resultados anteriores

      fetch(`/clientes?dni=${numeroIngresado}`)
        .then(response => response.json())
        .then(data => {
          if (data.length > 0) {
            listaClientes.style.display = "block"; // Mostrar la tabla y el botón
            renderTabla(data); // Mostrar solo el cliente encontrado
          } else {
            resultado.innerHTML = "DNI no encontrado.";
            listaClientes.style.display = "none"; // Ocultar la tabla y el botón
          }
        })
        .catch(error => {
          console.error('Error al verificar el DNI:', error);
          resultado.innerHTML = "Error al verificar el DNI.";
        });
    }

    // Añade esta función para reutilizar el renderizado de la tabla:
    function renderTabla(data) {
      const tabla = document.getElementById('tabla-clientes');
      tabla.innerHTML = '';
      data.forEach(cliente => {
        const fila = document.createElement('tr');
        fila.innerHTML = `
          <td>${cliente.idcliente}</td>
          <td>${cliente.nombre}</td>
          <td>${cliente.dni}</td>
        `;
        tabla.appendChild(fila);
      });
    }

    function cargarClientes() {
      fetch('/clientes')
        .then(response => response.json())
        .then(data => {
          renderTabla(data);
        })
        .catch(error => {
          console.error('Error al obtener los clientes:', error);
        });
    }
  </script>
</body>
</html>
